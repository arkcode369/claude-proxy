services:
  claude-proxy:
    build: .
    container_name: claude-proxy
    restart: unless-stopped
    ports:
      - "1111:1111"
    environment:
      - PORT=1111
      - UPSTREAM_URL=${UPSTREAM_URL}
      - FORCE_MODEL=${FORCE_MODEL:-claude-haiku-4-5-20251001}
      - API_KEYS=${API_KEYS}
    volumes:
      - ./logs:/app/logs   # persist logs on host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1111/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
