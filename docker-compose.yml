services:
  claude-proxy:
    build: .
    container_name: claude-proxy
    restart: unless-stopped
    ports:
      - "1111:1111"
    environment:
      - PORT=1111
      - API_KEYS=${API_KEYS}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1111/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
